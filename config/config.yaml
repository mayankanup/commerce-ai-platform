app:
  name: commerce-ai-platform
  version: 0.1.0
  environment: local

server:
  host: localhost
  port: 8080

database:
  path: data/ecommerce.db
  schemaPath: data/schema.sql
  seedPath: data/seed
  maxOpenConns: 10
  maxIdleConns: 5
  connMaxLifetime: 30m

ollama:
  endpoint: http://localhost:11434
  model: qwen3.6:latest

rag:
  vectordb:
    provider: memory
    collection: commerce-documents
    endpoint: http://localhost:8000

telemetry:
  enabled: false
  service_name: commerce-ai-platform

evaluation:
  enabled: false

logging:
  level: info
  format: json

llm:
  provider: ollama

embedding:
  provider: ollama
  model: all-minilm:latest
  endpoint: http://localhost:11434
